<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detector</title>
</head>
<body>
    <h1>Emotion Detection Web App</h1>
    <form method="post">
        <input type="text" name="text" placeholder="Enter text here">
        <input type="submit" value="Detect Emotion">
    </form>

    {% if result %}
        <h3>Emotion Detection Result:</h3>
        <pre>{{ result }}</pre>
    {% endif %}
</body>
</html>
